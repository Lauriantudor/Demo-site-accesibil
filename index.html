<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A11y Showcase - Start</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body,
      ssssssssssss html {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: "Segoe UI", sans-serif;
      }

      .container {
        display: flex;
        height: 100vh;
        width: 100%;
      }

      .side {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        transition: 0.3s ease;
        padding: 20px;
        text-align: center;
      }

      /* Ambele părți au același stil acum */
      .left {
        background-color: #f5f5f5;
        border-right: 1px solid #ddd;
      }
      .right {
        background-color: #f5f5f5;
      }

      h1 {
        color: #333;
        font-size: 2rem;
        margin-bottom: 2rem;
      }

      .button-group {
        display: flex;
        flex-direction: row;
        gap: 20px;
        justify-content: center;
      }
      .btn {
        padding: 15px 40px;
        font-size: 1.2rem;
        font-weight: 600;
        text-decoration: none;
        color: white;
        background-color: #333; /* Butoane identice */
        border-radius: 5px;
        transition: transform 0.2s;
      }

      .btn:hover {
        transform: scale(1.05);
        background-color: #000;
      }

      /* Divider-ul din mijloc (opțional) */
      .vs-circle {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: white;
        border: 1px solid #ddd;
        width: 50px;
        height: 50px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        color: #999;
        z-index: 10;
      }

      @media (max-width: 768px) {
        .container {
          flex-direction: column;
        }
        .vs-circle {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="vs-circle">SAU</div>

    <div class="container">
      <section class="side left">
        <h1>Exemplul Negativ</h1>
        <div class="button-group">
          <a
            href="pages/commplect inaccesibila/complect-inaccesibil.html"
            class="btn"
            >Complet inaccesibila</a
          >
          <a href="pages/partial accesibil/partial-inaccesibil.html" class="btn"
            >Partial inaccesibila</a
          >
        </div>
      </section>

      <section class="side right">
        <h1>Exemplul Pozitiv</h1>
        <a href="pages/asa-da-pages/accesibil.html" class="btn">Accesibil</a>
      </section>
    </div>
  </body>
</html>
